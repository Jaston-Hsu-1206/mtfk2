<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山羌茶坊 | 智慧環境感知點餐系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- LibSQL Web Client SDK -->
    <script type="module">
        import { createClient } from 'https://esm.sh/@libsql/client@0.17.3/web';
        window.libsql = { createClient };
    </script>
    <script src="checkout.js" type="module"></script>
    <style>
        :root {
            --primary: #2d5a27;
            --primary-light: #4a7c44;
            --primary-ultra-light: rgba(45, 90, 39, 0.05);
            --accent: #d4a373;
            --bg: #ffffff;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #717171;
            --error: #ff4d4f;
            --success: #52c41a;
            --weather-bg: #f0f4f8;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: #f2f2f7;
            color: var(--text);
            line-height: 1.5;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 95vw;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow);
            border-radius: 44px;
            border: 10px solid #1a1a1a; /* Phone Frame */
            overflow: hidden;
            margin: auto;
            animation: phoneEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes phoneEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Internal Scrollable Content */
        .scroll-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scrollbar-width: none; /* Hide scrollbar for cleaner look */
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        /* Header & Brand */
        header {
            padding: 24px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Menu Section */
        .menu-section {
            padding: 0 20px 100px; /* Extra bottom padding for cart summary */
            flex: 1;
        }

        .brand-logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: -2px;
        }

        .weather-widget {
            background: var(--weather-bg);
            padding: 8px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .weather-temp {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
        }

        .weather-loc {
            font-size: 11px;
            color: var(--text-muted);
            border-left: 1px solid #ddd;
            padding-left: 8px;
        }

        /* Recommendation Banner */
        .recommendation-banner {
            background: linear-gradient(135deg, #f8f9fa 0%, #eef2f3 100%);
            border-radius: 18px;
            padding: 16px;
            margin: 15px 0 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }

        .rec-icon {
            font-size: 24px;
            background: white;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .rec-content h5 {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2px;
        }

        .rec-content p {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .section-title {
            font-size: 17px;
            font-weight: 700;
            margin: 25px 0 15px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .product-card {
            background: #fff;
            border: 1.5px solid #f0f0f0;
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .product-card:active {
            transform: scale(0.96);
            background: #fafafa;
        }

        .product-card.active {
            border-color: var(--primary);
            background-color: var(--primary-ultra-light);
            box-shadow: 0 8px 20px rgba(45, 90, 39, 0.1);
        }

        .product-name {
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
        }

        .product-price {
            color: var(--accent);
            font-weight: 700;
            font-size: 14px;
        }

        /* Options Overlay */
        .options-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 30px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
            z-index: 1000;
            display: none;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .options-section.show {
            display: block;
            transform: translateY(0);
        }

        .option-group {
            margin-bottom: 24px;
        }

        .option-title {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chip-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            padding: 10px 18px;
            border: 1.5px solid #f0f0f0;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
            color: var(--text-muted);
        }

        .chip.selected {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .add-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(45, 90, 39, 0.25);
        }

        .add-btn:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        /* Cart Summary Bottom Bar */
        .summary-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 14px 20px 24px;
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            z-index: 900;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }

        .cart-mini-info {
            display: flex;
            flex-direction: column;
        }

        .cart-mini-total {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
        }

        .cart-mini-count {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .view-cart-btn {
            background: var(--accent);
            color: white;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 15px;
            border: none;
            box-shadow: 0 6px 15px rgba(212, 163, 115, 0.25);
        }

        /* Full Cart Overlay */
        #cartOverlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 2000;
            display: none;
            flex-direction: column;
            animation: slideUpIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUpIn {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .cart-header {
            padding: 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .close-cart {
            font-size: 24px;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            background: #f9f9f9;
            padding: 16px;
            border-radius: 18px;
        }

        .total-box {
            padding: 24px 20px 40px;
            border-top: 1.5px dashed #eee;
            background: #fafafa;
        }

        .checkout-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 800;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(45, 90, 39, 0.2);
        }

        #note-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            z-index: 5000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1.2);
            white-space: nowrap;
        }

        #note-bar.visible {
            transform: translateX(-50%) translateY(0);
        }

        .overlay-mask {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 950;
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="note-bar"></div>
        <div class="overlay-mask" id="mask" onclick="closeOverlays()"></div>
        
        <div class="scroll-container">
            <!-- Menu Section -->
            <div class="menu-section">
                <header>
                    <div class="brand-info">
                        <div class="brand-logo">鹿 山羌茶坊</div>
                        <p class="subtitle">Smart Ordering System</p>
                    </div>
                    <div class="weather-widget">
                    <select id="regionSelect" onchange="changeRegion()" style="background: transparent; border: none; font-size: 11px; font-weight: 600; color: var(--text-muted); cursor: pointer; outline: none; margin-bottom: 2px;">
                        <option value="Taipei">Taipei 台北</option>
                        <option value="Tokyo">Tokyo 東京</option>
                        <option value="Yokohama">Kanagawa 神奈川</option>
                        <option value="Mumbai">India 印度</option>
                    </select>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <div class="weather-temp" id="dispTemp">--°C</div>
                        <div class="weather-loc" id="dispStatus">Loading...</div>
                    </div>
                </div>
                </header>

                <!-- Weather Recommendation -->
                <div class="recommendation-banner" id="weatherRec">
                    <div class="rec-icon">☀️</div>
                    <div class="rec-content">
                        <h5 id="recTitle">酷熱消暑推薦</h5>
                        <p id="recDesc">氣溫炎熱 (28.4°C)，快來杯冰涼的特調奶茶去火解渴！</p>
                    </div>
                </div>

                <div class="section-title">🍵 精選茶飲</div>
                <div class="product-grid">
                    <div class="product-card" onclick="pick('TEA_RED', '天下紅茶', 40)">
                        <div class="product-name">天下紅茶</div>
                        <div class="product-price">$40</div>
                    </div>
                    <div class="product-card" onclick="pick('TEA_GRN', '天下綠茶', 35)">
                        <div class="product-name">天下綠茶</div>
                        <div class="product-price">$35</div>
                    </div>
                    <div class="product-card" onclick="pick('MILK_TEA', '特調奶茶', 55)">
                        <div class="product-name">特調奶茶</div>
                        <div class="product-price">$55</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mini Cart Bar -->
        <div class="summary-section" id="miniCart">
            <div class="cart-mini-info">
                <div class="cart-mini-total" id="miniTotal">$0</div>
                <div class="cart-mini-count" id="miniCount">0 項目</div>
            </div>
            <button class="view-cart-btn" onclick="openCart()">查看訂單</button>
        </div>

        <!-- Options Overlay -->
        <div class="options-section" id="options">
            <div class="section-title" style="margin-top: 0;">✨ <span id="curProd">產品</span></div>
            
            <div class="option-group">
                <div class="option-title">溫度選擇</div>
                <div class="chip-group" id="optTemp">
                    <div class="chip selected" onclick="setOpt('temp', '冰')">冰</div>
                    <div class="chip" onclick="setOpt('temp', '去冰')">去冰</div>
                    <div class="chip" onclick="setOpt('temp', '熱')">熱</div>
                </div>
            </div>

            <div class="option-group">
                <div class="option-title">甜度調整</div>
                <div class="chip-group" id="optSugar">
                    <div class="chip selected" onclick="setOpt('sugar', '正常')">正常</div>
                    <div class="chip" onclick="setOpt('sugar', '半糖')">半糖</div>
                    <div class="chip" onclick="setOpt('sugar', '微糖')">微糖</div>
                    <div class="chip" onclick="setOpt('sugar', '無糖')">無糖</div>
                </div>
            </div>

            <div class="option-group">
                <div class="option-title">加料加購 (+$10)</div>
                <div class="chip-group" id="optTops">
                    <div class="chip" onclick="toggleTop('TOP_BOBA', '珍珠')">珍珠</div>
                    <div class="chip" onclick="toggleTop('TOP_JELLY', '椰果')">椰果</div>
                </div>
                <div id="ruleError" style="color: var(--error); font-size: 11px; margin-top: 8px; font-weight: 600; display: none; line-height: 1.3;"></div>
            </div>

            <button class="add-btn" onclick="add()">加入購物清單</button>
        </div>

        <!-- Full Cart Overlay -->
        <div id="cartOverlay">
            <div class="cart-header">
                <div style="font-size: 20px; font-weight: 800;">您的訂單</div>
                <div class="close-cart" onclick="closeCart()">✕</div>
            </div>
            <div class="cart-items" id="cartList">
                <!-- Cart items will be injected here -->
            </div>
            <div class="total-box">
                <div class="price-row">
                    <span style="color: #888;">商品小計</span>
                    <span id="subTotal" style="font-weight: 700;">$0</span>
                </div>
                <div class="price-row discount" id="discRow" style="display: none; color: var(--success);">
                    <span>促銷折抵 (TENKA_80)</span>
                    <span id="discAmt">-$0</span>
                </div>
                <div class="price-row" style="margin-top: 15px; font-size: 24px; font-weight: 800; color: var(--primary);">
                    <span>應付總額</span>
                    <span id="netTotal">$0</span>
                </div>
                <button class="checkout-btn" onclick="finish()">確認結帳並支付</button>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        let cur = null;
        let opts = { temp: '冰', sugar: '正常', tops: [] };
        let currentTemp = 25; // Default

        const locations = {
            Taipei: { lat: 25.0330, lon: 121.5654, name: "Taipei" },
            Tokyo: { lat: 35.6895, lon: 139.6917, name: "Tokyo" },
            Yokohama: { lat: 35.4433, lon: 139.6367, name: "Kanagawa" },
            Mumbai: { lat: 19.0760, lon: 72.8777, name: "India" }
        };

        async function fetchWeather(city = 'Taipei') {
            const loc = locations[city];
            const statusEl = document.getElementById('dispStatus');
            if (statusEl) statusEl.innerText = "Fetching...";
            
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current_weather=true`);
                const data = await res.json();
                currentTemp = data.current_weather.temperature;
                updateWeatherUI(currentTemp, city);
            } catch (e) {
                console.error("Weather fetch failed", e);
                updateWeatherUI(25, city); // Fallback
            }
        }

        function updateWeatherUI(temp, city) {
            const tempEl = document.getElementById('dispTemp');
            const statusEl = document.getElementById('dispStatus');
            if (tempEl) tempEl.innerText = `${temp}°C`;
            if (statusEl) statusEl.innerText = `${city}`;
            
            const banner = document.getElementById('weatherRec');
            if (!banner) return;
            
            const title = document.getElementById('recTitle');
            const desc = document.getElementById('recDesc');
            const icon = banner.querySelector('.rec-icon');

            // Recommendation Logic based on topping_limit.md
            if (temp > 28) {
                title.innerText = "高溫消暑推薦";
                desc.innerText = `氣溫炎熱 (${temp}°C)，主推冷飲：『特調奶茶（冰）』。`;
                icon.innerText = "☀️";
            } else if (temp >= 15 && temp <= 28) {
                title.innerText = "舒適環境推薦";
                desc.innerText = `溫度適中 (${temp}°C)，主推招牌茶類：『天下紅茶』或『天下綠茶』。`;
                icon.innerText = "🍃";
            } else {
                title.innerText = "寒冷環境推薦";
                desc.innerText = `天氣寒冷 (${temp}°C)，主推熱飲：『天下紅茶（熱）』。`;
                icon.innerText = "❄️";
            }
        }

        function changeRegion() {
            const city = document.getElementById('regionSelect').value;
            fetchWeather(city);
        }

        // Initialize
        fetchWeather();

        function pick(id, name, price) {
            cur = { id, name, price };
            document.getElementById('curProd').innerText = name;
            
            document.getElementById('mask').style.display = 'block';
            const optSection = document.getElementById('options');
            optSection.style.display = 'block';
            setTimeout(() => optSection.classList.add('show'), 10);
            
            opts = { temp: '冰', sugar: '正常', tops: [] };
            const err = document.getElementById('ruleError');
            if (err) err.style.display = 'none';
            refreshUI();
        }

        function closeOverlays() {
            document.getElementById('mask').style.display = 'none';
            document.getElementById('options').classList.remove('show');
            setTimeout(() => {
                document.getElementById('options').style.display = 'none';
            }, 400);
            closeCart();
        }

        function setOpt(type, val) {
            opts[type] = val;
            checkRules();
            refreshUI();
        }

        function toggleTop(id, name) {
            const idx = opts.tops.findIndex(t => t.id === id);
            if (idx > -1) opts.tops.splice(idx, 1);
            else opts.tops.push({ id, name, price: 10 });
            checkRules();
            refreshUI();
        }

        function checkRules() {
            const err = document.getElementById('ruleError');
            const hasBoba = opts.tops.some(t => t.id === 'TOP_BOBA');
            
            // Logic from topping_limit.md: Hot drinks cannot have Boba
            if (opts.temp === '熱' && hasBoba) {
                opts.tops = opts.tops.filter(t => t.id !== 'TOP_BOBA');
                if (err) {
                    err.innerText = "很抱歉，基於茶飲品質堅持，熱飲暫不提供珍珠加購，建議您改選冰飲。";
                    err.style.display = 'block';
                }
                toast("⚠️ 規則攔截：熱飲不可加珍珠", "#ff4d4f");
            } else {
                if (err) err.style.display = 'none';
            }
        }

        function refreshUI() {
            document.querySelectorAll('#optTemp .chip').forEach(c => c.classList.toggle('selected', c.innerText === opts.temp));
            document.querySelectorAll('#optSugar .chip').forEach(c => c.classList.toggle('selected', c.innerText === opts.sugar));
            document.querySelectorAll('#optTops .chip').forEach(c => {
                const active = opts.tops.some(t => c.innerText.includes(t.name));
                c.classList.toggle('selected', active);
            });
        }

        function add() {
            if (!cur) return;
            const price = cur.price + (opts.tops.length * 10);
            cart.push({ ...cur, opts: { ...opts }, price });
            updateCart();
            closeOverlays();
            toast("✅ 已加入購物車", "#2d5a27");
        }

        function openCart() {
            if (cart.length === 0) return toast("🧺 購物車還是空的喔", "#555");
            document.getElementById('cartOverlay').style.display = 'flex';
            document.getElementById('mask').style.display = 'block';
        }

        function closeCart() {
            document.getElementById('cartOverlay').style.display = 'none';
            document.getElementById('mask').style.display = 'none';
        }

        function updateCart() {
            const list = document.getElementById('cartList');
            const miniTotal = document.getElementById('miniTotal');
            const miniCount = document.getElementById('miniCount');
            const subTotal = document.getElementById('subTotal');
            const netTotal = document.getElementById('netTotal');

            const total = cart.reduce((acc, i) => acc + i.price, 0);
            
            if (miniCount) miniCount.innerText = `${cart.length} 項目`;
            if (miniTotal) miniTotal.innerText = `$${total}`;
            if (subTotal) subTotal.innerText = `$${total}`;
            if (netTotal) netTotal.innerText = `$${total}`;

            if (cart.length === 0) {
                list.innerHTML = `<div style="text-align: center; margin-top: 60px; color: #ccc;">目前沒有點餐</div>`;
                return;
            }

            list.innerHTML = '';
            cart.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div>
                        <div style="font-weight: 700;">${item.name}</div>
                        <div style="font-size: 11px; color: #888;">${item.opts.temp} | ${item.opts.sugar}</div>
                    </div>
                    <div style="font-weight: 800; color: var(--primary);">$${item.price}</div>
                `;
                list.appendChild(div);
            });
        }

        async function finish() {
            if (cart.length === 0) return;
            
            const btn = document.querySelector('.checkout-btn');
            const originalText = btn.innerText;
            btn.innerText = "正在同步雲端...";
            btn.disabled = true;

            try {
                // Call the sync function from checkout.js
                const orderId = await window.syncOrderToTurso(cart);
                toast(`🚀 訂單 ${orderId} 已送出！`, "#d4a373");
                cart = [];
                updateCart();
                closeCart();
            } catch (err) {
                toast("❌ 雲端同步失敗，請稍後再試", "#ff4d4f");
                console.error(err);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function toast(txt, col) {
            const b = document.getElementById('note-bar');
            if (!b) return;
            b.innerText = txt;
            b.classList.add('visible');
            setTimeout(() => b.classList.remove('visible'), 2500);
        }
    </script>
</body>
</html>
